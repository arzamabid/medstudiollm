    <style>
      /* Smooth theme transitions */
      .theme-transition {
        transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
      }
      /* Custom scrollbars */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.03);
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      /* Print optimization specifically for Goals Roadmap output */
      @media print {
        header, .no-print, aside, section:not(.print-target) {
          display: none !important;
        }
        body {
          background: white !important;
          color: black !important;
        }
        .print-target {
          width: 100% !important;
          max-width: 100% !important;
          display: block !important;
          border: none !important;
          box-shadow: none !important;
        }
      }
    </style>

      function FormattedMedicalText({ text }) {
        const safeText = String(text || '');
        const lines = safeText.replace(/\r\n/g, '\n').split('\n');
        const elements = [];
        let i = 0;
        let paragraph = [];

        const flushParagraph = () => {
          if (!paragraph.length) return;
          elements.push(
            <div key={`p-${elements.length}`} className="whitespace-pre-wrap leading-relaxed">
              {paragraph.join('\n')}
            </div>
          );
          paragraph = [];
        };

        const splitTableRow = (row, expectedCells = null) => {
          const cells = String(row || '')
            .replace(/^\s*\|/, '')
            .replace(/\|\s*$/, '')
            .split('|')
            .map(x => x.trim());
          if (expectedCells && cells.length > expectedCells) {
            return [...cells.slice(0, expectedCells - 1), cells.slice(expectedCells - 1).join(' / ')];
          }
          return cells;
        };

        const isSeparator = (row) => /^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)+\|?\s*$/.test(String(row || ''));

        try {
          while (i < lines.length) {
            const line = lines[i] || '';
            const next = lines[i + 1] || '';
            const looksLikeMedicineHeader = /^\s*\|?\s*Medicine\s*\|\s*Purpose\s*\|\s*Instructions\s*\|\s*Side Effects\s*\|\s*Warnings\s*\|?\s*$/i.test(line);
            const looksLikeTable = line.includes('|') && (isSeparator(next) || looksLikeMedicineHeader);

            if (looksLikeTable) {
              flushParagraph();
              const headers = splitTableRow(line).filter(Boolean);
              i += 1;
              // Skip one or more markdown separator / dash-only lines, including malformed LLM separators.
              while (i < lines.length && (/^\s*\|?\s*:?-{2,}:?[-\s|:]*$/.test(lines[i] || '') || isSeparator(lines[i] || ''))) {
                i += 1;
              }
              const rows = [];
              while (i < lines.length && lines[i].includes('|') && !/^\s*$/.test(lines[i])) {
                if (!isSeparator(lines[i]) && !/^\s*\|?\s*:?-{2,}:?[-\s|:]*$/.test(lines[i] || '')) {
                  const cells = splitTableRow(lines[i], headers.length);
                  // Ignore blank/separator rows such as "-----" accidentally emitted by the model.
                  if (cells.some(c => c && !/^:?-{2,}:?$/.test(c.trim()))) rows.push(cells);
                }
                i += 1;
              }
              if (!headers.length) continue;
              if (!rows.length) {
                elements.push(
                  <div key={`empty-table-${elements.length}`} className="rounded-xl border border-amber-200 bg-amber-50 p-3 text-sm text-amber-800">
                    No usable rows were returned for this table. The app hid the broken empty table instead of showing dashed lines.
                  </div>
                );
                continue;
              }
              elements.push(
                <div key={`t-${elements.length}`} className="overflow-x-auto my-2">
                  <table className="min-w-full text-[11px] border border-slate-200 dark:border-slate-700 rounded-lg overflow-hidden bg-white dark:bg-slate-900">
                    <thead className="bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200">
                      <tr>{headers.map((h, idx) => <th key={idx} className="border border-slate-200 dark:border-slate-700 px-2 py-2 text-left font-bold">{h}</th>)}</tr>
                    </thead>
                    <tbody>
                      {rows.map((row, rIdx) => (
                        <tr key={rIdx} className="align-top">
                          {headers.map((_, cIdx) => <td key={cIdx} className="border border-slate-200 dark:border-slate-700 px-2 py-2 whitespace-pre-wrap">{row[cIdx] || ''}</td>)}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              );
              continue;
            }

            paragraph.push(line);
            i += 1;
          }
          flushParagraph();
          return <div className="flex flex-col gap-3">{elements}</div>;
        } catch (err) {
          console.error('FormattedMedicalText render failed:', err);
          return <pre className="whitespace-pre-wrap leading-relaxed">{safeText}</pre>;
        }
      }

      function PdfCanvasPreview({ fileUrl, fileName }) {
        const containerRef = React.useRef(null);
        const [status, setStatus] = React.useState('Rendering PDF preview...');

        React.useEffect(() => {
          let cancelled = false;
          const renderPdf = async () => {
            if (!fileUrl || !window.pdfjsLib || !containerRef.current) {
              setStatus('PDF preview is unavailable in this browser.');
              return;
            }
            try {
              window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
              containerRef.current.innerHTML = '';
              setStatus('Rendering PDF preview...');
              const pdf = await window.pdfjsLib.getDocument(fileUrl).promise;
              const maxPages = Math.min(pdf.numPages, 8);

              for (let pageNum = 1; pageNum <= maxPages; pageNum++) {
                if (cancelled) return;
                const page = await pdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: 1.55 });
                const pageWrap = document.createElement('div');
                pageWrap.className = 'mb-4 rounded-xl overflow-hidden border border-slate-200 bg-white shadow-sm';

                const label = document.createElement('div');
                label.className = 'px-3 py-2 text-[10px] font-bold text-slate-500 bg-slate-50 border-b border-slate-100';
                label.textContent = `${fileName || 'PDF'} — Page ${pageNum}`;

                const canvas = document.createElement('canvas');
                const outputScale = window.devicePixelRatio || 1;
                canvas.width = Math.floor(viewport.width * outputScale);
                canvas.height = Math.floor(viewport.height * outputScale);
                canvas.style.width = '100%';
                canvas.style.height = 'auto';
                const ctx = canvas.getContext('2d');
                ctx.setTransform(outputScale, 0, 0, outputScale, 0, 0);

                pageWrap.appendChild(label);
                pageWrap.appendChild(canvas);
                containerRef.current.appendChild(pageWrap);
                await page.render({ canvasContext: ctx, viewport }).promise;
              }
              setStatus(pdf.numPages > maxPages ? `Rendered first ${maxPages} of ${pdf.numPages} pages.` : '');
            } catch (err) {
              console.error('PDF render failed:', err);

            }
          };
          renderPdf();
          return () => {
            cancelled = true;
            if (containerRef.current) containerRef.current.innerHTML = '';
          };
        }, [fileUrl, fileName]);

        return (
          <div className="rounded-xl border border-slate-200 dark:border-slate-800 overflow-y-auto bg-slate-100 dark:bg-slate-950 mb-3 max-h-[680px] p-3">

      class AppErrorBoundary extends React.Component {
        constructor(props) {

        }
        static getDerivedStateFromError(error) {
          return { hasError: true, message: error?.message || 'Unknown UI error' };
        }
        componentDidCatch(error, info) {
          console.error('AZ MedStudio UI crash prevented:', error, info);
        }
        render() {
          if (this.state.hasError) {
            return (
              <div className="h-screen flex items-center justify-center bg-slate-50 text-slate-800 p-6">
                <div className="max-w-xl bg-white border border-rose-200 rounded-2xl p-6 shadow-sm">
                  <h1 className="text-lg font-bold text-rose-700 mb-2">Something went wrong in this panel</h1>
                  <p className="text-sm text-slate-600 mb-3">The app caught a UI error instead of crashing the whole page.</p>
                  <pre className="text-xs bg-rose-50 border border-rose-100 rounded-lg p-3 overflow-auto">{this.state.message}</pre>
                  <button onClick={() => window.location.reload()} className="mt-4 bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Reload app</button>
                </div>
              </div>
            );
          }
          return this.props.children;
        }
      }

        // Conservative patient profile extraction across PDFs, images with extracted text, notes, and Gemini case memory.
        // Important: offline extraction is NOT an LLM. It must never guess profile fields from random headers/dates.
        const normalizeProfileText = (value) => String(value || '')
          .replace(/\r/g, '\n')
          .replace(/\t/g, ' ')
          .replace(/[ ]{2,}/g, ' ');

        const looksLikeDateOrHeader = (value) => {
          const v = String(value || '').trim();
          if (!v) return true;
          if (/\b(exam|report|printed|collected|registered|date|time|page|hospital|clinic|doctor|consultant|file|mrn|id|invoice|result)\b/i.test(v)) return true;
          const dateCount = (v.match(/\b\d{1,2}[-\/]\d{1,2}[-\/]\d{2,4}\b/g) || []).length;
          if (dateCount >= 1) return true;
          const digitCount = (v.match(/\d/g) || []).length;
          const letterCount = (v.match(/[A-Za-z\u0600-\u06FF]/g) || []).length;
          if (digitCount > letterCount) return true;
          return false;
        };

        const isValidPatientName = (value) => {
          const v = String(value || '').trim();
          if (v.length < 2 || v.length > 80) return false;
          if (looksLikeDateOrHeader(v)) return false;
          if (!/[A-Za-z\u0600-\u06FF]/.test(v)) return false;
          if (/\b(male|female|sex|gender|age|allerg|nkda|exam|report|date|time|years?|yrs?)\b/i.test(v)) return false;
          const words = v.split(/\s+/).filter(Boolean);
          if (words.length > 7) return false;
          return true;
        };

        const cleanProfileValue = (value, field = 'generic') => {
          if (!value) return '';
          let v = String(value)
            .replace(/\s+/g, ' ')
            .replace(/^[-:|\s]+/, '')
            .replace(/[|;,]+$/g, '')
            .trim();

          // Stop at the next known label if PDF.js merged several fields into one line.
          v = v.split(/\b(?:age|sex|gender|dob|date of birth|mrn|id|file no|allerg(?:y|ies)|consultant|doctor|date|mobile|phone|exam|report|visit)\b\s*[:\-]?/i)[0].trim();

          if (field === 'name') return isValidPatientName(v) ? v : '';
          if (field === 'allergies') {
            if (/\b(no\s+known\s+(?:drug\s+)?allerg(?:y|ies)|nkda|nil|none|no)\b/i.test(v)) return 'No Known Drug Allergies (NKDA)';
            if (!v || looksLikeDateOrHeader(v)) return '';
            if (/\b(age|sex|gender|exam|report|date|time|patient name)\b/i.test(v)) return '';
            return v.length <= 120 ? v : '';
          }
          return v;
        };

        const getLabelValue = (text, labels, field = 'generic') => {
          const normalized = normalizeProfileText(text);
          const lines = normalized.split('\n').map(l => l.trim()).filter(Boolean);
          const labelPattern = labels.map(l => l.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');

          // 1) Same-line labels: "Patient Name: John Smith", "Sex / Age: Male / 40" etc.
          const sameLine = new RegExp(`\\b(?:${labelPattern})\\b\\s*[:\\-]?\\s*([^\\n|]{1,120})`, 'i');
          for (const line of lines) {
            const m = line.match(sameLine);
            if (m && m[1]) {
              const cleaned = cleanProfileValue(m[1], field);
              if (cleaned) return cleaned;
            }
          }

          // 2) Two-line labels: label on one line, value on the next line.
          const labelOnly = new RegExp(`^\\s*(?:${labelPattern})\\s*[:\\-]?\\s*$`, 'i');
          for (let i = 0; i < lines.length - 1; i++) {
            if (labelOnly.test(lines[i])) {
              const cleaned = cleanProfileValue(lines[i + 1], field);
              if (cleaned) return cleaned;
            }

          return '';

        const extractPatientProfileFromText = (text) => {

          const gender = genderRaw
            ? (genderRaw.toLowerCase() === 'm' ? 'Male' : genderRaw.toLowerCase() === 'f' ? 'Female' : genderRaw.charAt(0).toUpperCase() + genderRaw.slice(1).toLowerCase())

// Dynamic API Fetch helper with robust backoff & Google Search grounding integration
		const fetchGeminiResponse = async (userQuery, systemPrompt, includeInternet) => {
		  if (!apiKey) return null;

		  // ⚡ UPDATED: Points to the active Gemini 3.5 Flash production endpoint
		  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

		  // Construct precise payload with system instruction
		  const payload = {
			contents: [{ parts: [{ text: userQuery }] }]
		  };

		  if (systemPrompt) {
			payload.systemInstruction = { parts: [{ text: systemPrompt }] };
		  }

		  // ⚡ UPDATED: Uses the proper object mapping configuration for Google Search grounding
		  if (includeInternet) {
			payload.tools = [{
              google_search: {}
            }];
		  }

		  let delay = 1000;
		  for (let attempt = 0; attempt < 5; attempt++) {
			try {
			  const response = await fetch(url, {
				method: "POST",
				headers: { "Content-Type": "application/json" },
				body: JSON.stringify(payload)
			  });
  
			  if (response.ok) {
				const data = await response.json();
				return data;
			  } else {
				// Read precise error payloads if Google rejects the formatting parameters
				const errorData = await response.json();
				console.error(`Gemini 3.5 API Error (Attempt ${attempt + 1}):`, errorData);
			  }
			} catch (err) {
			  console.error(`Network Fetch Connection dropped on attempt ${attempt + 1}:`, err);
			}

			// Exponential backoff timing controller
			await new Promise(resolve => setTimeout(resolve, delay));
			delay *= 2;
		  }
		  throw new Error("Unable to contact Gemini AI services after multiple attempts.");
		};


        // Clean web-source formatter: prevents long raw grounding URLs from appearing in chat output.
        const TRUSTED_MEDICAL_SOURCE_HINTS = [
          'nhs', 'fda', 'nih', 'medlineplus', 'cdc', 'heart.org', 'american heart association',
          'mayo clinic', 'cleveland clinic', 'who', 'nice', 'gov', 'edu'
        ];

        const stripModelSourceDump = (answerText) => {
          if (!answerText) return '';
          return answerText
            .replace(/\n*\*\*Sources Found in Google Search Grounding:\*\*[\s\S]*$/i, '')
            .replace(/\n*Sources Found in Google Search Grounding:[\s\S]*$/i, '')
            .replace(/\n*\*\*Sources:\*\*[\s\S]*$/i, '')
            .replace(/\n*Sources:[\s\S]*$/i, '')
            .trim();
        };

        const readableSourceName = (chunk) => {
          const title = (chunk?.web?.title || '').trim();
          const uri = (chunk?.web?.uri || '').trim();

          // Prefer Gemini's title because Vertex grounding redirect URLs are long and ugly.
          if (title) {
            return title
              .replace(/^https?:\/\//i, '')
              .replace(/^www\./i, '')
              .replace(/\/$/, '')
              .trim();
          }

          try {
            const host = new URL(uri).hostname.replace(/^www\./i, '');
            // Hide Vertex redirect hosts from the user because they are not meaningful source names.
            if (host.includes('vertexaisearch.cloud.google.com')) return 'Trusted web source';
            return host;
          } catch (_) {
            return 'Trusted web source';
          }
        };

        const formatCleanGroundingSources = (groundingChunks) => {
          if (!Array.isArray(groundingChunks) || groundingChunks.length === 0) return '';

          const unique = [];
          const seen = new Set();

          groundingChunks.forEach(chunk => {
            if (!chunk?.web) return;
            const name = readableSourceName(chunk);
            const key = name.toLowerCase();
            if (!name || seen.has(key)) return;
            seen.add(key);
            unique.push({ name, key });
          });

          // Prefer official/high-trust medical sources when they are present.
          const trusted = unique.filter(src =>
            TRUSTED_MEDICAL_SOURCE_HINTS.some(hint => src.key.includes(hint))
          );

          const chosen = (trusted.length ? trusted : unique).slice(0, 4);
          if (!chosen.length) return '';

          return "\n\nTrusted sources used:\n" + chosen.map(src => `• ${src.name}`).join('\n');
        };

        const KNOWN_MEDICINES_GLOBAL_REGEX = new RegExp(`\\b(?:${KNOWN_MEDICINES.map(escapeRegex).join('|')})\\b`, 'ig');
        const DOSE_REGEX = /\b\d+(?:\.\d+)?\s*(?:mg|mcg|g|ml|iu|units?|%)\b/i;
        const INSTRUCTION_REGEX = /\b(?:po|oral|od|qd|bid|tid|qid|qhs|hs|pc|ac|prn|sos|daily|once|twice|thrice|morning|evening|night|nocte|after food|before food|with food|empty stomach|for \d+ days?)\b/i;
        const FORM_REGEX = /\b(?:tablet|tab\.?|capsule|cap\.?|syrup|drops|injection|inj\.?|cream|ointment|spray|gel|patch|sachet)\b/i;

        const looksLikeNonMedicineLine = (line) => /\b(?:patient|name|age|gender|sex|exam|report|ultrasound|sonography|impression|findings|diagnosis|hospital|clinic|doctor|consultant|date|time|page|mrn|invoice|total|reference range|result|cholesterol|glucose|creatinine|hemoglobin)\b/i.test(line) && !KNOWN_MEDICINES_REGEX.test(line);

        const splitPossibleMedicationSegments = (text) => {
          const source = String(text || '')
            .replace(/\r/g, '\n')
            .replace(/[•●]/g, '\n- ')
            .replace(/\s{2,}/g, ' ');
          const rough = source.split(/\n|;/).map(x => x.trim()).filter(Boolean);
          const segments = [];
          for (const line of rough) {
            const cleaned = line.replace(/^[-*\d.)\s]+/, '').trim();
            if (!cleaned) continue;

            // If PDF.js merged multiple medicines in one line, split immediately before known medicine names.
            const withBreaks = cleaned.replace(KNOWN_MEDICINES_GLOBAL_REGEX, (match, offset) => offset > 0 ? `\n${match}` : match);

        const extractMedicationCandidates = () => {
          const corpus = getDocumentCorpus();

          for (const segment of segments) {

            const hasDose = DOSE_REGEX.test(segment);

            const hasPrescriptionContext = /\b(?:rx|medicine|medication|drug|prescribed|dose|sig)\b/i.test(segment);
            if (!(hasMed || (hasDose && hasInstructionOrForm) || (hasPrescriptionContext && hasDose))) continue;

            const knownMatch = segment.match(KNOWN_MEDICINES_REGEX);
            const genericMatch = segment.match(/\b([A-Za-z][A-Za-z0-9+\-/()]{2,}(?:\s+[A-Za-z0-9+\-/()]{2,}){0,4})\s+(\d+(?:\.\d+)?\s*(?:mg|mcg|g|ml|iu|units?|%))\b/i);

                .replace(/^\s*[-*\d.)]+\s*/, '')

              const instructionIndex = s.search(/\b(?:po|oral|od|qd|bid|tid|qid|qhs|hs|pc|ac|prn|sos|daily|once|twice|thrice|morning|evening|night|nocte|after food|before food|with food|empty stomach|for\s+\d+\s+days?|take|apply|use)\b/i);
              if (instructionIndex > 0) s = s.slice(0, instructionIndex).trim();

              // If there is a dose, keep only through the first dose token to avoid pulling multiple medicines into one row.
              const doseMatch = s.match(/\b\d+(?:\.\d+)?\s*(?:mg|mcg|g|ml|iu|units?|%)\b/i);
              if (doseMatch) s = s.slice(0, (doseMatch.index || 0) + doseMatch[0].length).trim();

              s = s.replace(/[,:;\-\s]+$/g, '').trim();

              const invalid = !s || s.length < 3 || s.length > 90 || /\b(?:patient|name|age|gender|sex|exam|report|ultrasound|impression|findings|diagnosis|hospital|clinic|date|time|reference|result)\b/i.test(s) || /\d{1,2}[-\/]\d{1,2}[-\/]\d{2,4}/.test(s);
              return invalid ? 'Unclear medicine name' : s;

            return displayGoal ? `${displayGoal.title}\n\n${displayGoal.content}\n\nEvidence: ${displayGoal.evidence}` : '';
          }
          return '';
        };


        const translateMedicalText = async (text, lang) => {
          if (!text?.trim() || lang === 'en') return text || '';
          if (!apiKey) return '';
          const targetLanguage = LANGUAGE_NAMES[lang] || lang;
          const translationPrompt = `Translate the following medical workspace text into ${targetLanguage}.

Rules:
- Preserve medicine names, dosages, lab values, units, dates, and source file names exactly.
- Keep the same line breaks and simple patient-friendly structure.
- Do not add new medical advice.
- Do not remove uncertainty or safety warnings.
- Return only the translated text.

TEXT:
${text}`;
          const translationResult = await fetchGeminiResponse(
            translationPrompt,
            'You are a careful medical translation assistant. Translate only; do not diagnose or add clinical recommendations.',
            false
          );
          return stripModelSourceDump(translationResult?.candidates?.[0]?.content?.parts?.[0]?.text || '').trim();
        };

        const handleTranslateMiddleView = async (lang) => {
          setMiddleViewLang(lang);
          clearGeneratedMiddlePanels();
          clearMiddleTranslations();

          if (lang === 'en') return;

          // Preloaded sample documents already have local translations, so no API call is needed.
          if (middleView === 'preview' && currentActiveDoc && translateDocContent(currentActiveDoc.id, lang)) {
            return;
          }

          // Static panels already use LOCALIZATION_DICTIONARY. Only preview/roadmap dynamic text needs live translation.
          if (!['preview', 'roadmap'].includes(middleView)) return;

          const selectedGoal = activeGoals.find(g => g.id === selectedGoalId);
          const displayGoal = selectedGoal ? getGoalDisplay(selectedGoal) : null;
          const sourceText = middleView === 'roadmap' ? (displayGoal?.content || '') : getRawMiddleWorkspaceText();
          const sourceEvidence = middleView === 'roadmap' ? (displayGoal?.evidence || '') : '';
          if (!sourceText.trim() && !sourceEvidence.trim()) return;

          // Without an API key, sample labels still localize, but custom free text cannot be translated.
          if (!apiKey) return;

          setIsTranslatingMiddle(true);
          try {
            const [mainTranslated, evidenceTranslated] = await Promise.all([
              sourceText ? translateMedicalText(sourceText, lang) : Promise.resolve(''),
              sourceEvidence ? translateMedicalText(sourceEvidence, lang) : Promise.resolve('')
            ]);
            setTranslatedMiddleText(mainTranslated);
            setTranslatedEvidenceText(evidenceTranslated);
          } catch (err) {
            console.error('Middle panel translation failed:', err);
            setTranslatedMiddleText('Translation failed. Please check your API key and try again.');
            setTranslatedEvidenceText('');
          } finally {
            setIsTranslatingMiddle(false);
          }
        };


        useEffect(() => {
          clearGeneratedMiddlePanels();
          clearMiddleTranslations();
          if (middleViewLang !== 'en') {
            // Let React update selected doc/goal first, then translate the newly selected view.
            setTimeout(() => handleTranslateMiddleView(middleViewLang), 0);
          }
          // eslint-disable-next-line react-hooks/exhaustive-deps
        }, [middleView, selectedGoalId, selectedDocId]);

        const getMiddleWorkspaceText = () => {
          if (middleView === 'intro') {
            return labels.workspaceIntroDesc;

          if (middleView === 'preview' && currentActiveDoc) {
            // Use dynamically translated content if it is a preloaded sample document
            const translatedSample = translateDocContent(currentActiveDoc.id, middleViewLang);
            return translatedSample || currentActiveDoc.content;

          if (middleView === 'uncertainty') {
            return labels.uncertaintyDesc;
          }
          if (middleView === 'summary') {
            return isSampleCase ? labels.summaryFaris : (translatedMiddleText || getDocumentCorpus().slice(0, 2000) || labels.summaryGeneral);

          if (middleView === 'roadmap') {

            const displayGoal = goal ? getGoalDisplay(goal) : null;
            return displayGoal ? `${displayGoal.title}\n\n${displayGoal.content}\n\n${displayGoal.evidence}` : "No specific goal selected.";

          return "";

        const handleSummarizeMiddleOnly = async () => {

            return;

              const realSummaryResult = await fetchGeminiResponse(summaryPrompt, "You are a careful clinical summary assistant.", false);
              const realSummaryText = realSummaryResult.candidates?.[0]?.content?.parts?.[0]?.text || "No summary was generated.";
              setMiddleSummary(realSummaryText);

          printWindow.document.write(`
            <html>
              <head>
                <title>AZ MedStudio - Patient Case Goals Roadmap</title>
                <style>

              .replace(/Highly elevated fatty lipids/g, "Lípidos grasos muy elevados")

              .replace(/Taken by mouth/g, "Tomado por vía oral")

              .replace(/Taken by mouth/g, "Pris par la bouche")
              .replace(/Once daily/g, "Une fois par jour");
          } else if (['ar', 'hi', 'ur'].includes(middleViewLang)) {
            // For dynamic uploaded-document answers, do not fake-translate by adding a prefix.
            // Real translation is handled by translateMedicalText() when an API key is available.
            result = content;
          }
          return result;
        };

        return (
          <div className={`flex flex-col h-screen ${theme === 'dark' ? 'bg-[#0f172a] text-slate-100' : 'bg-[#f3f4f8] text-slate-800'}`}>

              {/* LEFT SIDEBAR PANEL: INPUT & SOURCES */}

                      </p>
                    )}
                  </div>

                </div>

              </aside>

            </div>

          </div>
        );
      }

      // Render App inside div#root
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<AppErrorBoundary><App /></AppErrorBoundary>);
    </script>
</body>
</html>
