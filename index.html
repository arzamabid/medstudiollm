<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Tailwind CSS CDN -->

    <!-- React and Babel CDNs -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      /* Smooth theme transitions */
      .theme-transition {
        transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
      }
      /* Custom scrollbars */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.03);
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      /* Print optimization specifically for Goals Roadmap output */
      @media print {
        header, .no-print, aside, section:not(.print-target) {
          display: none !important;
        }
        body {
          background: white !important;
          color: black !important;
        }
        .print-target {
          width: 100% !important;
          max-width: 100% !important;
          display: block !important;
          border: none !important;
          box-shadow: none !important;
        }
      }
    </style>
</head>

                  )}

                </div>

              </section>

              {/* RIGHT COLUMN: CLINICAL STUDIO ROADMAP PANEL & CHAT */}
              <aside className="w-96 border-l border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col shrink-0 overflow-hidden print-target print-full-width">
                
                {/* Header of the Studio Panel */}
                <div className="p-4 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-slate-50/50 dark:bg-slate-850 shrink-0 no-print">
                  <div>
                    <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">Clinical Studio</span>
                    <p className="text-[11px] text-slate-500 mt-0.5 font-semibold">10 core medical goal roadmaps</p>
                  </div>
                  <span className="text-[9px] bg-indigo-600 text-white font-bold px-2.5 py-0.5 rounded-full uppercase tracking-wider">
                    Interactive Mode
                  </span>
                </div>

                {/* NotebookLM Styled Colorful Grid list of 10 goals as clinical roadmap sections (Hidden when docs is empty) */}
                <div className="p-4 flex flex-col gap-2.5 overflow-y-auto h-96 border-b border-slate-100 dark:border-slate-850 bg-[#fbfbfd] dark:bg-slate-900/40 shrink-0">
                  <p className="text-[10px] font-bold text-slate-400 uppercase tracking-wide no-print">Clinical Roadmap Sections:</p>
                  
                  {docs.length === 0 ? (
                    <div className="flex-1 flex flex-col items-center justify-center text-center p-6 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-xl">
                      <p className="text-xs text-slate-400 font-semibold leading-relaxed">
                        No active medical records loaded.<br/>Please upload clinical data or load the pre-populated case study to generate clinical goals.
                      </p>
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 gap-2">
                      {GOALS_DATABASE.map((goal) => {
                        const isSelected = selectedGoalId === goal.id && middleView === 'roadmap';
                        return (
                          <div 
                            key={goal.id}
                            onClick={() => {
                              setSelectedGoalId(goal.id);
                              clearMiddleTranslations();
                              clearGeneratedMiddlePanels();
                              setMiddleView('roadmap');
                            }}
                            className={`p-3 rounded-xl border transition cursor-pointer flex items-start gap-3 bg-gradient-to-r ${goal.color} ${
                              isSelected ? 'ring-2 ring-indigo-500 border-transparent shadow-sm' : 'border-slate-200/60 dark:border-slate-800'
                            }`}
                          >
                            <div className="p-2 bg-white dark:bg-slate-800 rounded-lg text-md shadow-xs shrink-0">
                              {goal.icon}
                            </div>
                            <div className="min-w-0 flex-1">
                              <strong className={`text-xs font-bold block leading-tight ${goal.textColor}`}>{goal.title}</strong>
                              <p className="text-[10px] text-slate-500 dark:text-slate-400 mt-0.5 leading-tight truncate">{goal.desc}</p>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

                {/* BOTTOM RIGHT: CHAT & MULTI-LANGUAGE BOT INTERACTION FRAME */}
                <div className="flex-1 flex flex-col bg-[#f8f9fa] dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 overflow-hidden no-print">
                  
                  {/* Chat logs */}
                  <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
                    {chatHistory.map((chat, idx) => (
                      <div key={idx} className={`flex flex-col ${chat.sender === 'user' ? 'items-end' : 'items-start'}`}>
                        <div className={`p-3 rounded-xl text-xs leading-relaxed max-w-[85%] ${
                          chat.sender === 'user' ? 'bg-slate-800 text-white shadow-xs' : 'bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-200 border border-slate-200 dark:border-slate-800 shadow-xs'
                        }`}>
                          {chat.text}
                        </div>
                        {chat.isInternet && (
                          <span className="text-[9px] text-emerald-700 font-bold mt-1 flex items-center gap-1">
                            <Icons.Internet /> Web fast research verified
                          </span>
                        )}
                      </div>
                    ))}
                  </div>

                  {/* Chat Controls bar */}
                  <div className="p-4 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 flex flex-col gap-2 shrink-0">
                    <div className="flex justify-between items-center text-[9px] text-slate-400 font-bold uppercase tracking-wider">
                      <span>Multi-Language Assistant</span>
                      <div className="flex items-center gap-1.5">
                        <input 
                          type="checkbox" 
                          id="internet_check" 
                          checked={includeInternet}
                          onChange={(e) => setIncludeInternet(e.target.checked)}
                          className="rounded border-slate-300 text-indigo-600 focus:ring-indigo-500 scale-90"
                        />
                        <label htmlFor="internet_check" className="cursor-pointer">Enable Web Search</label>
                      </div>
                    </div>

                    <div className="flex items-center gap-2">
                      <button 
                        onClick={toggleSpeech}
                        title="Speech Recognition input"
                        className={`p-2.5 rounded-full border transition shrink-0 ${
                          isListening ? 'bg-red-50 border-red-300 scale-105' : 'bg-slate-50 dark:bg-slate-850 border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700'
                        }`}
                      >
                        <Icons.Microphone isListening={isListening} />
                      </button>

                      <input 
                        type="text" 
                        value={chatQuery}
                        onChange={(e) => setChatQuery(e.target.value)}
                        onKeyDown={(e) => { if (e.key === 'Enter') handleSendChat(); }}
                        placeholder="Type (any language) e.g. Amlodipine purpose?"
                        className="flex-1 text-xs px-3.5 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-800 text-slate-800 dark:text-slate-100 focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:bg-white dark:focus:bg-slate-900 placeholder:text-slate-400"
                      />

                      <button 
                        onClick={handleSendChat}
                        className="bg-indigo-600 hover:bg-indigo-700 text-white font-bold text-xs px-4 py-2.5 rounded-xl transition shadow-xs"
                      >
                        Send
                      </button>
                    </div>

                    {isListening && (
                      <p className="text-[10px] text-red-500 animate-pulse text-center font-medium">
                        🎙️ Listening to your verbal query...
                      </p>
                    )}
                  </div>

                </div>

              </aside>

            </div>

          </div>
        );
      }

      // Render App inside div#root
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
